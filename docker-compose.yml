services:
  snapclaw:
    build:
      context: .
      # args:
      #   EXTRA_APT_PACKAGES: "git curl jq"
      #   OPENCLAW_VERSION: "2026.4.8"
    ports:
      - "3000:3000"
    shm_size: "2gb"
    environment:
      - PORT=3000
      - OPENCLAW_STATE_DIR=/data/.openclaw
    volumes:
      - snapclaw-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  snapclaw-data:
